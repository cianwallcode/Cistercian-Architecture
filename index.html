<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cistercian Architecture</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='serif' font-weight='bold'>C</text></svg>">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #ffffff; --txt: #000000; --brd: #000000; }
        body { margin: 0; font-family: 'Times New Roman', serif; background-color: var(--bg); color: var(--txt); }
        header { display: flex; justify-content: space-between; padding: 2rem; border-bottom: 1px solid var(--brd); align-items: center; }
        .logo { font-weight: bold; cursor: pointer; font-size: 1.5rem; }
        
        nav button { background: none; border: 1px solid var(--brd); padding: 0.5rem 1rem; cursor: pointer; margin-left: 10px; font-family: sans-serif; text-transform: uppercase; }
        
        .page { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; min-height: 70vh; }
        .page.active { display: block; }
        
        #landing { display: flex; align-items: center; justify-content: space-between; gap: 2rem; margin-top: 2rem; }
        .hero-logo { flex: 0 0 200px; text-align: right; border: 1px solid var(--brd); padding: 5px; }
        .hero-logo img { max-width: 100%; height: auto; display: block; }

        .cta-button { background: var(--txt); color: var(--bg); padding: 1rem 2rem; border: none; cursor: pointer; text-transform: uppercase; font-weight: bold; margin-top: 2rem; }
        
        #map-container { height: 500px; width: 100%; border: 1px solid var(--brd); margin-top: 1rem; }
        #map { height: 100%; width: 100%; }
        
        footer { border-top: 1px solid var(--brd); padding: 2rem; text-align: center; font-size: 0.8rem; margin-top: 4rem; }
        .table-container { overflow-x: auto; margin-top: 2rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid var(--brd); padding: 12px; text-align: left; }
        th { background-color: var(--txt); color: var(--bg); }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">Cistercian Architecture</div>
        <nav>
            <button type="button" onclick="showPage('location-map')">Map</button>
            <button type="button" onclick="showPage('detail-analysis')">Analysis</button>
        </nav>
    </header>

    <main id="app">
        <section id="landing" class="page active">
            <div style="flex:1;">
                <h1>The Cistercian Paradigm</h1>
                <p>An architectural and historical analysis of the Order of Cistercians in Ireland.</p>
                <button type="button" class="cta-button" onclick="showPage('location-map')">Learn more</button>
            </div>
            <div class="hero-logo">
                <img src="image_e1fb5c.jpg" alt="Illustration">
            </div>
        </section>

        <section id="location-map" class="page">
            <h2>Location Map</h2>
            <div id="map-container"><div id="map"></div></div>
        </section>

        <section id="detail-analysis" class="page">
            <h2>Detail Analysis</h2>
            <div class="table-container">
                <table id="foundationTable">
                    <thead><tr><th>Name</th><th>County</th></tr></thead>
                    <tbody><tr><td>Mount Melleray</td><td>Waterford</td></tr></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer><p>&copy; 2026 Cistercian Architecture Research Initiative. All rights reserved.</p></footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map;
        
        function showPage(pageId) {
            console.log("Navigating to: " + pageId); // Check console for this output
            
            // Hide all
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            
            // Show target
            const target = document.getElementById(pageId);
            if(target) {
                target.style.display = 'block';
            }

            // Map init
            if (pageId === 'location-map') {
                if (!map) {
                    map = L.map('map').setView([53.3, -8.0], 7);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                }
                setTimeout(() => map.invalidateSize(), 100);
            }
        }
    </script>
</body>
</html>
